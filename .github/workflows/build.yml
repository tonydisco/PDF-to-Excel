name: Build installers

# Build bản cài đặt app Tauri (UI mới) + sidecar Python, NHÚNG luôn Tesseract
# -> người dùng cài 1 file, không cần cài Tesseract.
#   • macOS:  .dmg  (Intel x64 + Apple Silicon arm64)
#   • Windows: .msi + .exe (NSIS)
# Tải ở tab Actions → run → Artifacts. Push tag v* thì tạo Release đính kèm.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, label: macos-arm64 }   # Apple Silicon
          - { os: macos-13, label: macos-x64 }      # Intel
          - { os: windows-latest, label: windows-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python deps (engine + AI SDK + pyinstaller)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      # ---------------------------------------------------------- macOS
      - name: Nhúng Tesseract (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install tesseract dylibbundler
          bash desktop/bundle_tesseract.sh

      - name: Build app (macOS)
        if: runner.os == 'macOS'
        env:
          PYTHON: python
        run: bash desktop/build_macos.sh

      - name: Gom .dmg (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p out
          find desktop/src-tauri/target -path '*/release/bundle/dmg/*.dmg' -exec cp {} "out/BCTC-Excel-${{ matrix.label }}.dmg" \;
          ls -la out

      # ---------------------------------------------------------- Windows
      - name: Nhúng Tesseract (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install tesseract -y --no-progress
          ./desktop/bundle_tesseract.ps1

      - name: Build app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PYTHON: python
        run: ./desktop/build_windows.ps1

      - name: Gom .msi/.exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force out | Out-Null
          Get-ChildItem desktop/src-tauri/target/release/bundle -Recurse -Include *.msi,*.exe |
            Where-Object { $_.FullName -match 'bundle[\\/](msi|nsis)[\\/]' } |
            ForEach-Object { Copy-Item $_.FullName (Join-Path out ("BCTC-Excel-${{ matrix.label }}" + $_.Extension)) -Force }
          Get-ChildItem out

      # ---------------------------------------------------------- publish
      - uses: actions/upload-artifact@v4
        with:
          name: BCTC-Excel-${{ matrix.label }}
          path: out/*
          if-no-files-found: error

      - name: Đính kèm Release (khi push tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
